# Alembic 配置(平台化 T-P03)。
# 连接串不在此写死:env.py 从 DATABASE_URL env 读(缺省 sqlite),与 storage.db 一致。
# 用法:
#   alembic upgrade head        # 建/升级到最新
#   alembic revision -m "xxx" --autogenerate   # 改了模型后生成迁移(需先 upgrade head)
#   alembic downgrade -1        # 回退一步

[alembic]
script_location = migrations
prepend_sys_path = .
# 时间戳 + slug 命名迁移文件,便于排序
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
